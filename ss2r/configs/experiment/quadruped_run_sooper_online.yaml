# @package _global_
defaults:
  - mujoco_playground_dm_control
  - override /environment: quadruped
  - override /agent: mbpo
  - override /agent/data_collection: step
  - override /agent/cost_robustness: pessimistic_cost_update
  - _self_


training:
  num_timesteps: 2000000
  safe: true
  train_domain_randomization: false
  eval_domain_randomization: false
  safety_budget: 100

agent:
  activation: swish
  reset_on_eval: false
  model_grad_updates_per_step: 50
  critic_grad_updates_per_step: 20
  safety_filter: sooper
  advantage_threshold: 0.2
  # learning_rate: 1e-5
  # critic_learning_rate: 1e-5
  # model_learning_rate: 3e-4