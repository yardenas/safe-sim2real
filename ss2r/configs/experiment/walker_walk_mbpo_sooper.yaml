# @package _global_
defaults:
  - override /environment: walker
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - _self_

training:
  num_timesteps: 10000
  num_envs: 1
  num_evals: 20
  train_domain_randomization: true
  eval_domain_randomization: true
  safe: true
  safety_budget: 150.
  wandb_id: rgawckct

environment:
  train_params:
    torso_length: [0.5, 0.5]
    friction: [0.0, 0.0]
    joint_damping: [0.0, 0.0]
    gear: [0., 0.]

  eval_params:
    torso_length: [0.5, 0.5]
    friction: [0., 0.]
    joint_damping: [0., 0.]
    gear: [0., 0.]

agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  activation: swish
  batch_size: 256
  min_replay_size: 1000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 50000
  num_model_rollouts: 50000
  learning_rate: 1e-4
  critic_learning_rate: 1e-4
  model_learning_rate: 3e-4
  pessimism: 100
  optimism: 0
  safety_filter: sooper