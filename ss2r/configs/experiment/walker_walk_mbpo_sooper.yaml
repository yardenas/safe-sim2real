# @package _global_
defaults:
  - override /environment: walker
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - _self_

training:
  num_timesteps: 10000
  num_envs: 1
  num_evals: 20
  train_domain_randomization: false
  eval_domain_randomization: false
  safe: true
  safety_budget: 100.
  wandb_id: 500ig5d2
  
agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  activation: swish
  batch_size: 256
  min_replay_size: 1000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 5000
  model_grad_updates_per_step: 10000
  num_model_rollouts: 50000
  learning_rate: 1e-5
  critic_learning_rate: 5e-4
  model_learning_rate: 5e-4
  pessimism: 5
  optimism: 0
  safety_filter: sooper