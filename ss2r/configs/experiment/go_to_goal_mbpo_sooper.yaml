# @package _global_
defaults:
  - mujoco_playground_dm_control
  - override /environment: go_to_goal
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - override /agent/cost_robustness: pessimistic_cost_update
  - _self_

training:
  num_timesteps: 80000
  train_domain_randomization: false
  eval_domain_randomization: false
  safe: true
  safety_budget: 25
  action_repeat: 4
  num_envs: 1
  num_evals: 20
  wandb_id: ____

agent:
  activation: swish
  batch_size: 256
  min_replay_size: 1000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 50000
  num_model_rollouts: 100000
  learning_rate: 1e-5
  critic_learning_rate: 1e-5
  model_learning_rate: 3e-4
  pessimism: 0
  optimism: 0
  safety_discounting: 0.999
  safety_filter: sooper
