# @package _global_
defaults:
  - override /environment: go_to_goal
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - _self_

training:
  num_timesteps: 10000
  safe: true
  train_domain_randomization: true
  eval_domain_randomization: true
  safety_budget: 25
  num_envs: 1
  num_evals: 20
  action_repeat: 4
  wandb_id: ht7qygz8

environment:
  train_params:
    damping:
      x: [1., 1.]
      y: [1., 1.]
      z: [1., 1.]
    gear:
      x: [0.0, 0.0]
      z: [0.0, 0.0]
    mass: [1., 1.]

  eval_params:
    damping:
      x: [1., 1.]
      y: [1., 1.]
      z: [1., 1.]
    gear:
      x: [0.0, 0.0]
      z: [0.0, 0.0]
    mass: [1., 1.]


agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  activation: swish
  batch_size: 256
  min_replay_size: 1000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 40000
  learning_rate: 1e-4
  critic_learning_rate: 1e-3
  model_learning_rate: 3e-4
  pessimism: 10
  optimism: 0
  advantage_threshold: 0.2
  safety_filter: sooper
