# @package _global_
defaults:
  - override /environment: go_to_goal
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - override /agent/cost_robustness: pessimistic_cost_update
  - _self_

training:
  num_timesteps: 2500000
  train_domain_randomization: false
  eval_domain_randomization: false
  safe: true
  safety_budget: 25
  action_repeat: 4
  num_envs: 20
  num_evals: 15
  wandb_id: e4w72i55

agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  activation: swish
  batch_size: 256
  min_replay_size: 10000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 85000
  num_model_rollouts: 100000
  learning_rate: 1e-6
  critic_learning_rate: 1e-7
  model_learning_rate: 3e-4
  pessimism: 3.5
  optimism: 0
  normalize_budget: false
  discounting: 0.95
  safety_filter: sooper
  advantage_threshold: 0.2
  load_auxiliaries: true
  model_to_real_data_ratio: 0.25