# @package _global_
defaults:
  - override /environment: rccar_real
  - override /agent: mbpo
  - _self_

environment:
  action_delay: 1
  observation_delay: 0
  sliding_window: 5
  dt: 0.03333333
  sample_init_pose: false

training:
  num_envs: 1
  num_evals: 40
  num_timesteps: 10000
  episode_length: 250
  safe: true
  train_domain_randomization: false
  eval_domain_randomization: false
  safety_budget: 5.0
  wandb_id: 0ltkzlyo

agent:
  batch_size: 256
  min_replay_size: 0
  max_replay_size: 1048576
  policy_hidden_layer_sizes: [64, 64]
  model_to_real_data_ratio: 1.
  num_critic_updates_per_actor_update: 1
  critic_grad_updates_per_step: 1
  model_grad_updates_per_step: 100
  learning_rate: 1e-5
  critic_learning_rate: 1e-5
  model_learning_rate: 3e-4
  num_model_rollouts: 400
  model_pretrain_episodes: 0
  pessimism: 5
  optimism: 0
  safety_filter: sooper

