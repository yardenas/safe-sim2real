# @package _global_
defaults:
  - override /environment: go_to_goal
  - override /agent: mbpo
  - override /agent/penalizer: lagrangian
  - _self_

training:
  num_timesteps: 1000000
  train_domain_randomization: false
  eval_domain_randomization: false
  safe: true
  safety_budget: 5
  action_repeat: 4
  num_envs: 20
  num_evals: 15
  wandb_id: atpwmr5r

agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  activation: swish
  batch_size: 256
  min_replay_size: 5000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 10
  model_grad_updates_per_step: 50
  num_model_rollouts: 100000
  pessimism: 30
  optimism: -10
  safety_discounting: 0.999
  safety_filter: null
  offline: true
  normalize_budget: false
  penalizer:
    lagrange_multiplier: 5.
    penalty_multiplier: 2.
    penalty_multiplier_factor: 0.25